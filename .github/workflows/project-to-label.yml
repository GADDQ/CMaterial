name: Sync Project to Labels

on:
  project_v2_item:
    types: [edited]

jobs:
  sync-to-issue:
    runs-on: ubuntu-latest
    if: github.event.changes.field_value.field_name == 'Status'
    steps:
      - name: Sync Status to Label
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          NEW_STATUS="${{ github.event.project_v2_item.content_node_id }}"
          STATUS_VALUE="${{ github.event.changes.field_value.to }}"
          ISSUE_NUMBER=$(gh api graphql -f query='query($id: ID!){ node(id: $id) { ... on Issue { number } } }' -f id=${{ github.event.project_v2_item.content_node_id }} --jq '.data.node.number')
          
          STATUS_LABELS=("Todo" "Planning" "Paused" "In Progress")

          if [ "$STATUS_VALUE" == "Done" ]; then
            gh issue close $ISSUE_NUMBER --reason "completed"
            for label in "${STATUS_LABELS[@]}"; do
              gh issue edit $ISSUE_NUMBER --remove-label "$label" || true
            done
          else
            gh issue reopen $ISSUE_NUMBER || true
            for label in "${STATUS_LABELS[@]}"; do
              gh issue edit $ISSUE_NUMBER --remove-label "$label" || true
            done
            gh issue edit $ISSUE_NUMBER --add-label "$STATUS_VALUE"
          fi
